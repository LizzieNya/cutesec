name: Build and Release Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., v4.0.0)'
        required: true
        default: 'v4.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
      - name: Build Tauri EXE
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version }}
          releaseName: "Release ${{ github.event.inputs.version }}"
          releaseDraft: false
          prerelease: false

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
      - name: Build Android APK
        run: npx tauri android build --apk
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/apk/arm64-v8a/release/*.apk
